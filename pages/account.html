<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/logo/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản cá nhân - Vethic AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/account.css">
</head>
<body class="dashboard-body">
    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <h1 class="page-title">Tài khoản cá nhân</h1>
            <div class="user-menu flex items-center gap-4">
                <span class="user-name font-medium">Nguyễn Văn Đức Long</span>
                <div class="avatar-small"><img src="../assets/avatar/account.jpg" alt="User" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
            </div>
        </header>

        <div class="page-container">
            <div class="account-container">
                
                <!-- Profile Card -->
                <div class="profile-card">
                    <div class="avatar-wrapper">
                        <img src="../assets/avatar/account.jpg" alt="Nguyễn Văn Đức Long" class="avatar-large">
                        <div class="camera-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                        </div>
                    </div>
                    <div class="profile-info">
                        <h2>Nguyễn Văn Đức Long</h2>
                        <p class="profile-meta">Thành viên từ tháng 6, 2026</p>
                        <span class="pet-tag">3 Thú cưng</span>
                    </div>
                </div>

                <!-- Basic Info Card -->
                <div class="setting-card">
                    <div class="setting-header">
                        <div class="setting-title">Thông tin cơ bản</div>
                        <a href="#" style="color: var(--text-body);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </a>
                    </div>
                    <div class="setting-body">
                        <form>
                            <div class="form-row">
                                <div class="form-group" style="flex: 1 1 100%;">
                                    <label>Tên người dùng</label>
                                    <input type="text" value="Nguyễn Văn Đức Long">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" value="nguyenvanduclong@gmail.com">
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input type="tel" value="0123456789">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn btn-primary" style="padding: 10px 24px;">Lưu thay đổi</button>
                                <button type="button" class="btn btn-outline" style="padding: 10px 24px;">Chuyển đổi tài khoản</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Preferences Card -->
                <div class="setting-card">
                    <div class="setting-header">
                        <div class="setting-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                            Tùy Chỉnh & Ngôn ngữ
                        </div>
                    </div>
                    <div class="setting-body">
                        <div class="pref-row">
                            <div class="pref-box">
                                <div class="pref-label">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                                    Ngôn ngữ hiển thị
                                </div>
                                <div class="pref-value">
                                    Tiếng Việt
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                </div>
                            </div>
                            
                            <div class="pref-box">
                                <div class="pref-label">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                                    Chế độ tối
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
