<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/logo/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử hoạt động - Vethic AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/activity-history.css">
</head>
<body class="bg-gray">
    <header class="topbar">
        <h1 class="page-title">Lịch sử hoạt động</h1>
        <div class="user-menu flex items-center gap-4">
            <span class="user-name font-medium">Nguyễn Văn A</span>
            <div class="avatar-small"><img src="../assets/avatar/messi_avatar.jpg" alt="User" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
        </div>
    </header>

    <main class="container page-content" style="padding: 48px 40px; max-width: 1200px; margin: 0 auto;">
        
        <!-- Stats Row -->
        <div class="stats-row flex gap-6" style="margin-bottom: 32px;">
            <div class="stat-card" style="flex: 1; background: var(--white); border-radius: 16px; border: 1px solid var(--border-light); padding: 24px;">
                <div class="flex items-center gap-3" style="margin-bottom: 16px;">
                    <div style="width: 40px; height: 40px; border-radius: 10px; background: rgba(0, 105, 80, 0.1); color: var(--primary); display: flex; align-items: center; justify-content: center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                    <span style="color: var(--text-body); font-size: 14px; font-weight: 500;">Tổng số tư vấn</span>
                </div>
                <div style="font-size: 36px; font-weight: 700; color: var(--text-dark);">24</div>
            </div>

            <div class="stat-card" style="flex: 1; background: var(--white); border-radius: 16px; border: 1px solid var(--border-light); padding: 24px;">
                <div class="flex items-center gap-3" style="margin-bottom: 16px;">
                    <div style="width: 40px; height: 40px; border-radius: 10px; background: rgba(220, 38, 38, 0.1); color: var(--danger); display: flex; align-items: center; justify-content: center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    </div>
                    <span style="color: var(--text-body); font-size: 14px; font-weight: 500;">Trường hợp khẩn cấp</span>
                </div>
                <div style="font-size: 36px; font-weight: 700; color: var(--text-dark);">02</div>
            </div>

            <div class="stat-card" style="flex: 1; background: var(--white); border-radius: 16px; border: 1px solid var(--border-light); padding: 24px;">
                <div class="flex items-center gap-3" style="margin-bottom: 16px;">
                    <div style="width: 40px; height: 40px; border-radius: 10px; background: var(--background-light); color: var(--text-dark); display: flex; align-items: center; justify-content: center;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </div>
                    <span style="color: var(--text-body); font-size: 14px; font-weight: 500;">Hoạt động gần nhất</span>
                </div>
                <div style="font-size: 24px; font-weight: 700; color: var(--text-dark); padding-top: 8px;">Hôm nay, 14:20</div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="activity-table-container" style="background: var(--white); border-radius: 16px; border: 1px solid var(--border-light); overflow: hidden;">
            <div class="flex justify-between items-center" style="padding: 24px;">
                <h3 style="font-size: 18px; font-weight: 600; color: var(--text-dark); margin: 0;">Danh sách chẩn đoán</h3>
                <div class="flex items-center gap-4">
                    <div style="position: relative;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-body);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" placeholder="Tìm kiếm thú cưng..." style="padding: 10px 16px 10px 40px; border: 1px solid var(--border-light); border-radius: 8px; font-size: 14px; width: 250px; outline: none; background: #F8F9FA;">
                    </div>
                    <button class="btn btn-outline" style="padding: 10px; border-color: var(--border-light); color: var(--text-dark);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
                    </button>
                </div>
            </div>

            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); background: #F8F9FA; font-size: 11px; font-weight: 700; color: var(--text-body); text-transform: uppercase; letter-spacing: 0.5px;">
                        <th style="padding: 16px 24px; font-weight: 700;">Ngày</th>
                        <th style="padding: 16px 24px; font-weight: 700;">Thú cưng</th>
                        <th style="padding: 16px 24px; font-weight: 700;">Vấn đề</th>
                        <th style="padding: 16px 24px; font-weight: 700;">Mức độ</th>
                        <th style="padding: 16px 24px; font-weight: 700; text-align: right;">Hành động</th>
                    </tr>
                </thead>
                <tbody id="activityTableBody">
                    <!-- Dynamic content will be rendered here by JS -->
                </tbody>
            </table>

            <!-- Pagination -->
            <div class="flex justify-between items-center" style="padding: 16px 24px; border-top: 1px solid var(--border-light); font-size: 13px; color: var(--text-body);">
                <div>Hiển thị 1-4 trên tổng số 24</div>
                <div class="flex gap-1">
                    <button class="pagination-btn" style="width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-body);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <button class="pagination-btn active" style="width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--primary); background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer;">1</button>
                    <button class="pagination-btn" style="width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-body);">2</button>
                    <button class="pagination-btn" style="width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-body);">3</button>
                    <button class="pagination-btn" style="width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border-light); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-body);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="../js/pet-data.js"></script>
    <script src="../js/activity-history.js"></script>
</body>
</html>
