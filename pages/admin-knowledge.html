<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý kiến thức bệnh - Admin Vethic AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <h1 class="page-title">Quản lý cơ sở dữ liệu y tế (AI)</h1>
            <div class="user-profile">
                <span class="user-name">Adminstrator</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <div class="recent-activity">
                <div class="section-header-card" style="display: flex; gap: 16px; margin-bottom: 24px;">
                    <div style="flex: 1; display: flex; align-items: center; background: var(--background-light); border: 1px solid var(--border-light); border-radius: 8px; padding: 0 16px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-body); margin-right: 8px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" placeholder="Tìm kiếm tên bệnh, triệu chứng..." style="flex: 1; padding: 12px 0; border: none; background: transparent; outline: none; font-family: inherit; font-size: 14px;">
                    </div>
                    <select style="padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border-light); outline: none; font-family: inherit;">
                        <option value="all">Tất cả loài</option>
                        <option value="dog">Chó</option>
                        <option value="cat">Mèo</option>
                    </select>
                    <button class="btn btn-primary" style="display: flex; align-items: center; gap: 8px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Thêm bệnh mới
                    </button>
                </div>

                <div class="activity-table-container">
                    <table class="activity-table">
                        <thead>
                            <tr>
                                <th>Mã bệnh</th>
                                <th>Tên bệnh</th>
                                <th>Loài mắc</th>
                                <th>Mức độ nghiêm trọng</th>
                                <th>Cập nhật lần cuối</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>#D001</td>
                                <td><span style="font-weight: 500;">Viêm dạ dày - ruột</span></td>
                                <td><span class="status" style="background: rgba(90, 90, 108, 0.1); color: #5A5A6C;">Chó, Mèo</span></td>
                                <td><span class="status warning" style="background: rgba(251, 188, 5, 0.2); color: #D99000;">Trung bình</span></td>
                                <td>Hôm nay, 09:30</td>
                                <td>
                                    <div style="display: flex; gap: 8px;">
                                        <button style="border: none; background: transparent; cursor: pointer; color: var(--primary);" title="Chỉnh sửa"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg></button>
                                        <button style="border: none; background: transparent; cursor: pointer; color: var(--danger);" title="Xóa"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>#D002</td>
                                <td><span style="font-weight: 500;">Bệnh Care (Canine Distemper)</span></td>
                                <td><span class="status" style="background: rgba(90, 90, 108, 0.1); color: #5A5A6C;">Chó</span></td>
                                <td><span class="status" style="background: rgba(186, 26, 26, 0.1); color: var(--danger);">Nghiêm trọng (Khẩn cấp)</span></td>
                                <td>15/05/2026</td>
                                <td>
                                    <div style="display: flex; gap: 8px;">
                                        <button style="border: none; background: transparent; cursor: pointer; color: var(--primary);" title="Chỉnh sửa"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg></button>
                                        <button style="border: none; background: transparent; cursor: pointer; color: var(--danger);" title="Xóa"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>#D003</td>
                                <td><span style="font-weight: 500;">Viêm da dị ứng</span></td>
                                <td><span class="status" style="background: rgba(90, 90, 108, 0.1); color: #5A5A6C;">Chó, Mèo</span></td>
                                <td><span class="status success">Nhẹ</span></td>
                                <td>10/05/2026</td>
                                <td>
                                    <div style="display: flex; gap: 8px;">
                                        <button style="border: none; background: transparent; cursor: pointer; color: var(--primary);" title="Chỉnh sửa"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg></button>
                                        <button style="border: none; background: transparent; cursor: pointer; color: var(--danger);" title="Xóa"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    
    <style>
        .avatar-small {
            width: 32px;
            height: 32px;
            background-color: var(--secondary);
            color: var(--primary-hover);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</body>
</html>
