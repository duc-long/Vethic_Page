<!DOCTYPE html>
<html lang="vi">

<head>
    <link rel="icon" type="image/png" href="../assets/logo/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý kiến thức bệnh - Admin Vethic AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, Roboto, Helvetica, sans-serif;
            color: var(--text-body);
            background-color: var(--background-light);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard-content {
            padding-top: 32px;
        }

        .recent-activity {
            padding: 0;
        }

        .page-panel {
            background: var(--white);
            border: 1px solid rgba(219, 231, 224, 0.9);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(18, 53, 43, 0.08);
            padding: 24px;
        }

        .section-header-card {
            margin-bottom: 20px;
            align-items: flex-start;
            gap: 18px;
        }

        .section-header-card h2 {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .section-header-card .section-subtitle {
            max-width: 760px;
            line-height: 1.6;
        }

        .knowledge-toolbar {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .knowledge-search {
            flex: 1 1 320px;
            display: flex;
            align-items: center;
            background: rgba(0, 105, 80, 0.04);
            border: 1px solid rgba(188, 202, 194, 0.55);
            border-radius: 12px;
            padding: 0 16px;
            transition: all 0.2s ease;
        }

        .knowledge-search:focus-within {
            border-color: rgba(0, 105, 80, 0.35);
            box-shadow: 0 0 0 4px rgba(0, 105, 80, 0.08);
        }

        .knowledge-search input {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }

        .knowledge-select {
            min-width: 160px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(188, 202, 194, 0.55);
            outline: none;
            font-family: inherit;
            background: var(--white);
            box-shadow: 0 2px 10px rgba(18, 53, 43, 0.03);
        }

        .knowledge-add-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .knowledge-table {
            width: 100%;
            border-collapse: collapse;
        }

        .knowledge-table th,
        .knowledge-table td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .knowledge-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .knowledge-table td {
            text-align: left;
            vertical-align: top;
        }

        .knowledge-actions {
            display: flex;
            gap: 8px;
        }

        .knowledge-icon-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        .knowledge-icon-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(0, 105, 80, 0.28);
            color: var(--primary);
            box-shadow: 0 8px 18px rgba(18, 53, 43, 0.08);
        }

        .knowledge-icon-btn.edit {
            color: var(--primary);
        }

        .knowledge-icon-btn.delete {
            color: var(--danger);
        }

        .knowledge-icon-btn.delete:hover {
            border-color: rgba(186, 26, 26, 0.25);
            color: var(--danger);
        }

        .knowledge-species-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 6px;
        }

        .knowledge-species-dog {
            background: rgba(0, 105, 80, 0.08);
            color: var(--primary);
        }

        .knowledge-species-cat {
            background: rgba(90, 90, 108, 0.1);
            color: #5A5A6C;
        }

        .knowledge-empty {
            padding: 28px 24px;
            text-align: center;
            color: var(--text-body);
            background: rgba(0, 105, 80, 0.03);
            border: 1px dashed rgba(188, 202, 194, 0.85);
            border-radius: 16px;
        }

        .knowledge-actions {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            align-items: center;
        }

        .knowledge-icon-btn,
        .knowledge-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        .knowledge-link-btn.btn {
            box-shadow: 0 10px 22px rgba(0, 105, 80, 0.14);
        }

        .knowledge-link-btn.btn:hover {
            transform: translateY(-1px);
        }

        .activity-table-container {
            background: var(--white);
            border: 1px solid rgba(219, 231, 224, 0.9);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 18px 50px rgba(18, 53, 43, 0.06);
        }

        .activity-table {
            min-width: 860px;
        }

        .activity-table thead th {
            background: #fbfcfb;
            color: #6b7280;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .activity-table tbody tr:hover {
            background: rgba(0, 105, 80, 0.025);
        }

        .activity-table td {
            vertical-align: middle;
        }

        .knowledge-actions .btn-primary {
            min-height: 40px;
            padding: 0 14px;
            border-radius: 12px;
        }

        .knowledge-actions .btn-primary svg {
            flex: 0 0 auto;
        }

        .knowledge-actions .btn-primary:hover {
            transform: translateY(-1px);
        }

        .knowledge-icon-btn {
            width: 40px;
            height: 40px;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(188, 202, 194, 0.55);
            background: var(--white);
            color: var(--text-body);
            transition: all 0.2s ease;
            flex: 0 0 auto;
        }

        .knowledge-icon-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(0, 105, 80, 0.28);
            color: var(--primary);
            box-shadow: 0 8px 18px rgba(18, 53, 43, 0.08);
        }

        .knowledge-icon-btn.edit {
            color: var(--primary);
        }

        .knowledge-icon-btn.delete {
            color: var(--danger);
        }

        .knowledge-icon-btn.delete:hover {
            border-color: rgba(186, 26, 26, 0.25);
            color: var(--danger);
        }

        .page-toolbar-note {
            margin-top: 10px;
            color: var(--text-body);
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .knowledge-toolbar {
                flex-direction: column;
            }

            .page-panel {
                padding: 18px;
            }

            .knowledge-actions {
                gap: 6px;
            }

            .knowledge-icon-btn {
                width: 38px;
                height: 38px;
            }

            .knowledge-modal-panel {
                padding: 18px;
            }
        }
    </style>
</head>

<body class="admin-body">
    <main class="main-content">
        <header class="topbar">
            <h1 class="page-title">Quản lý cơ sở dữ liệu y tế (AI)</h1>
            <div class="user-profile">
                <span class="user-name">Administrator</span>
                <div class="avatar" style="padding: 0; overflow: hidden; background: transparent;">
                    <img src="../assets/avatar/admin_avatar.png" alt="Admin" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="recent-activity">
                <div class="page-panel">
                    <div class="section-header-card">
                        <div>
                            <h2>Kiến thức bệnh</h2>
                            <p class="section-subtitle">Quản lý danh sách bệnh, mở trang riêng để tạo mới hoặc cập nhật
                                nội dung.</p>
                        </div>
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <button id="export-knowledge-btn" class="btn btn-secondary knowledge-link-btn" style="background-color: white; border: 1px solid rgba(188, 202, 194, 0.55); color: var(--text-body); cursor: pointer; padding: 0 16px; min-height: 40px; border-radius: 12px; font-weight: 500;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Xuất báo cáo
                            </button>
                            <a class="btn btn-primary knowledge-link-btn" href="admin-knowledge-editor.html">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                                Tạo kiến thức mới
                            </a>
                        </div>
                    </div>

                    <div class="knowledge-toolbar">
                        <div class="knowledge-search">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="color: var(--text-body); margin-right: 8px;">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input id="knowledge-search-input" type="text"
                                placeholder="Tìm kiếm tên bệnh, triệu chứng...">
                        </div>
                        <select id="species-filter" class="knowledge-select">
                            <option value="all">Tất cả loài</option>
                            <option value="dog">Chó</option>
                            <option value="cat">Mèo</option>
                        </select>
                    </div>

                    <div class="activity-table-container">
                        <table class="activity-table activity-table--compact">
                            <thead>
                                <tr>
                                    <th>Mã bệnh</th>
                                    <th>Tên bệnh</th>
                                    <th>Loài mắc</th>
                                    <th>Mức độ nghiêm trọng</th>
                                    <th>Cập nhật lần cuối</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="knowledge-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let knowledgeData = JSON.parse(localStorage.getItem('knowledgeData'));
        if (!knowledgeData) {
            knowledgeData = [
                { id: 'D001', name: 'Viêm dạ dày - ruột', species: ['dog', 'cat'], severity: 'medium', updatedAt: 'Hôm nay, 09:30', symptoms: 'Nôn mửa, tiêu chảy, chán ăn.' },
                { id: 'D002', name: 'Bệnh Care (Canine Distemper)', species: ['dog'], severity: 'high', updatedAt: '15/05/2026', symptoms: 'Sốt, ho, nôn, tiêu chảy.' },
                { id: 'D003', name: 'Viêm da dị ứng', species: ['dog', 'cat'], severity: 'low', updatedAt: '10/05/2026', symptoms: 'Ngứa, đỏ da, rụng lông nhẹ.' }
            ];
            localStorage.setItem('knowledgeData', JSON.stringify(knowledgeData));
        }

        const knowledgeTableBody = document.getElementById('knowledge-table-body');
        const knowledgeSearchInput = document.getElementById('knowledge-search-input');
        const speciesFilter = document.getElementById('species-filter');
        const params = new URLSearchParams(window.location.search);

        if (params.get("saved") === "true") {
            window.addEventListener("DOMContentLoaded", () => {

                const id = params.get("id") || "";

                if (window.parent && window.parent.showAdminToast) {
                    window.parent.showAdminToast(
                        "Cập nhật thành công",
                        `Kiến thức ${id} đã được cập nhật thành công.`
                    );
                }

                // Xóa query trên URL để F5 không hiện lại toast
                window.history.replaceState({}, document.title, "admin-knowledge.html");
            });
        }

        function normalizeText(value) {
            return value.trim().toLowerCase();
        }

        function getSeverityLabel(severity) {
            if (severity === 'high') return 'Nghiêm trọng (Khẩn cấp)';
            if (severity === 'medium') return 'Trung bình';
            return 'Nhẹ';
        }

        function getSeverityClass(severity) {
            if (severity === 'high') return 'status danger';
            if (severity === 'medium') return 'status warning';
            return 'status success';
        }

        function getSpeciesBadgeClass(species) {
            return species === 'dog' ? 'knowledge-species-badge knowledge-species-dog' : 'knowledge-species-badge knowledge-species-cat';
        }


        function renderKnowledgeTable() {
            const searchValue = normalizeText(knowledgeSearchInput.value);
            const selectedSpecies = speciesFilter.value;

            const filteredItems = knowledgeData.filter((item) => {
                const matchesSearch = !searchValue || [item.id, item.name, item.symptoms].some((field) => normalizeText(field).includes(searchValue));
                const matchesSpecies = selectedSpecies === 'all' || item.species.includes(selectedSpecies);
                return matchesSearch && matchesSpecies;
            });

            knowledgeTableBody.innerHTML = filteredItems.length
                ? filteredItems.map((item) => `
                    <tr>
                        <td>#${item.id}</td>
                        <td><span style="font-weight: 500;">${item.name}</span></td>
                        <td>${item.species.map((species) => `<span class="${getSpeciesBadgeClass(species)}">${species === 'dog' ? 'Chó' : 'Mèo'}</span>`).join('')}</td>
                        <td><span class="${getSeverityClass(item.severity)}">${getSeverityLabel(item.severity)}</span></td>
                        <td>${item.updatedAt}</td>
                        <td>
                            <div class="knowledge-actions">
                                <button type="button" class="knowledge-icon-btn edit" data-action="edit" data-id="${item.id}" aria-label="Chỉnh sửa">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
                                </button>
                                <button type="button" class="knowledge-icon-btn delete" data-action="delete" data-id="${item.id}" aria-label="Xóa">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('')
                : `
                    <tr>
                        <td colspan="6">
                            <div class="knowledge-empty">Không tìm thấy kiến thức bệnh phù hợp.</div>
                        </td>
                    </tr>
                `;
        }

        knowledgeSearchInput.addEventListener('input', renderKnowledgeTable);
        speciesFilter.addEventListener('change', renderKnowledgeTable);

        knowledgeTableBody.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-action]');
            if (!button) return;

            const action = button.dataset.action;
            const knowledgeItem = knowledgeData.find(item => item.id === button.dataset.id);

            if (!knowledgeItem) return;

            if (action === "edit") {
                // Chuyển sang trang chỉnh sửa
                window.location.href = `admin-knowledge-editor.html?id=${knowledgeItem.id}`;
                return;
            }

            if (action === "delete") {
                const messageText = `Bạn có chắc chắn muốn xóa kiến thức bệnh ${knowledgeItem.id} - ${knowledgeItem.name}?`;
                
                const doDelete = () => {
                    const deleteIndex = knowledgeData.findIndex((item) => item.id === knowledgeItem.id);
                    if (deleteIndex >= 0) {
                        knowledgeData.splice(deleteIndex, 1);
                        localStorage.setItem('knowledgeData', JSON.stringify(knowledgeData));
                        renderKnowledgeTable();
                        if (window.parent && window.parent.showAdminToast) {
                            window.parent.showAdminToast('Đã xóa kiến thức bệnh', `Kiến thức ${knowledgeItem.id} - ${knowledgeItem.name} đã được xóa.`);
                        } else {
                            alert(`Kiến thức ${knowledgeItem.id} - ${knowledgeItem.name} đã được xóa.`);
                        }
                    }
                };

                if (window.parent && window.parent.showAdminModal) {
                    window.parent.showAdminModal({
                        type: 'danger',
                        title: 'Xác nhận xóa bệnh',
                        message: messageText,
                        confirmText: 'Xóa bệnh',
                        onConfirm: doDelete
                    });
                } else {
                    if (confirm(messageText)) {
                        doDelete();
                    }
                }
            }
        });

        renderKnowledgeTable();

        // Export Report Logic
        document.getElementById('export-knowledge-btn').addEventListener('click', function() {
            if (!knowledgeData || knowledgeData.length === 0) {
                alert("Không có dữ liệu để xuất.");
                return;
            }

            // Define CSV headers
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "Mã Bệnh,Tên Bệnh,Loài Mắc,Mức Độ Nghiêm Trọng,Triệu Chứng,Cập Nhật Lần Cuối\n";

            // Add rows
            knowledgeData.forEach(function(item) {
                const id = item.id || "";
                const name = item.name ? `"${item.name.replace(/"/g, '""')}"` : "";
                const species = item.species ? `"${item.species.join(', ')}"` : "";
                const severity = item.severity ? getSeverityLabel(item.severity) : "";
                const symptoms = item.symptoms ? `"${item.symptoms.replace(/"/g, '""')}"` : "";
                const updatedAt = item.updatedAt || "";

                csvContent += `${id},${name},${species},${severity},${symptoms},${updatedAt}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Vethic_Knowledge_Report.csv");
            document.body.appendChild(link); // Required for FF
            
            link.click();
            document.body.removeChild(link);
            
            if (window.parent && window.parent.showAdminToast) {
                window.parent.showAdminToast("Thành công", "Đã xuất báo cáo kiến thức bệnh thành công!");
            } else {
                alert("Đã xuất báo cáo thành công!");
            }
        });
    </script>
</body>

</html>
