<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ quản trị viên - Vethic AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--primary);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            position: relative;
            box-shadow: 0 4px 12px rgba(0, 105, 80, 0.15);
        }

        .profile-avatar-edit {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .profile-avatar-edit:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .profile-title h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .profile-title p {
            color: var(--text-body);
            font-size: 15px;
        }

        .profile-card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 24px rgba(18, 53, 43, 0.04);
        }

        .profile-card h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-input {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            background-color: var(--background-light);
            font-family: inherit;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 105, 80, 0.1);
            background-color: var(--white);
        }

        .form-input[readonly] {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
        }

        /* Success Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(0, 105, 80, 0.95);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 105, 80, 0.2);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="admin-body">
    <main class="main-content">
        <header class="topbar">
            <h1 class="page-title">Hồ sơ của tôi</h1>
            <div class="user-profile">
                <span class="user-name">Administrator</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar-large">
                        A
                        <div class="profile-avatar-edit" title="Thay đổi ảnh đại diện">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
                        </div>
                    </div>
                    <div class="profile-title">
                        <h2>Administrator</h2>
                        <p>Quản trị viên hệ thống cấp cao</p>
                    </div>
                </div>

                <div class="profile-card">
                    <h3>Thông tin cá nhân</h3>
                    <form id="profile-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Họ và tên</label>
                                <input type="text" class="form-input" value="Administrator" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-input" value="admin@vethic.vn" readonly title="Không thể thay đổi email hệ thống">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Số điện thoại</label>
                                <input type="tel" class="form-input" value="+84 987 654 321">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Vai trò</label>
                                <input type="text" class="form-input" value="Super Admin" readonly>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-primary" id="save-profile-btn">Lưu thay đổi</button>
                        </div>
                    </form>
                </div>

                <div class="profile-card">
                    <h3>Đổi mật khẩu</h3>
                    <form id="password-form">
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label class="form-label">Mật khẩu hiện tại</label>
                                <input type="password" class="form-input" placeholder="Nhập mật khẩu hiện tại" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Mật khẩu mới</label>
                                <input type="password" class="form-input" placeholder="Nhập mật khẩu mới" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Xác nhận mật khẩu mới</label>
                                <input type="password" class="form-input" placeholder="Xác nhận mật khẩu mới" required>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="save-password-btn">Cập nhật mật khẩu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span id="toast-message">Cập nhật thành công!</span>
    </div>

    <script>
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        let toastTimer;

        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.getElementById('save-profile-btn').addEventListener('click', () => {
            showToast('Thông tin cá nhân đã được lưu!');
        });

        document.getElementById('save-password-btn').addEventListener('click', () => {
            showToast('Mật khẩu đã được cập nhật thành công!');
        });
    </script>
</body>
</html>
