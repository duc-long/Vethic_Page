<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/logo/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt hệ thống - Admin Vethic AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <h1 class="page-title">Cài đặt hệ thống</h1>
            <div class="user-profile">
                <span class="user-name">Adminstrator</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="dashboard-content" style="max-width: 800px;">
            <div class="settings-card">
                <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 24px; color: var(--text-dark);">Thông tin chung</h2>
                <div class="form-group">
                    <label>Tên ứng dụng</label>
                    <input type="text" class="form-input" value="Vethic AI Veterinary Assistant">
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label>Email liên hệ hỗ trợ</label>
                    <input type="email" class="form-input" value="support@vethic.vn">
                </div>
                <button class="btn btn-primary" style="margin-top: 24px;">Lưu thay đổi</button>
            </div>

            <div class="settings-card" style="margin-top: 32px;">
                <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 24px; color: var(--text-dark);">Cấu hình AI</h2>
                <div class="form-group">
                    <label>Mô hình ngôn ngữ (LLM)</label>
                    <select class="form-input">
                        <option>GPT-4 (Mặc định)</option>
                        <option>Gemini 1.5 Pro</option>
                        <option>Claude 3 Opus</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label>Độ chính xác (Temperature)</label>
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <input type="range" min="0" max="1" step="0.1" value="0.2" style="flex: 1;">
                        <span style="font-weight: 600; color: var(--text-dark);">0.2</span>
                    </div>
                    <p style="font-size: 12px; color: var(--text-body); margin-top: 8px;">Giá trị thấp giúp AI đưa ra kết quả y tế chính xác và nhất quán hơn.</p>
                </div>
                <button class="btn btn-primary" style="margin-top: 24px;">Lưu cấu hình</button>
            </div>
            
            <div class="settings-card" style="margin-top: 32px;">
                <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 24px; color: var(--danger);">Khu vực nguy hiểm</h2>
                <p style="color: var(--text-body); margin-bottom: 16px; font-size: 14px;">Các hành động trong khu vực này có thể gây ảnh hưởng không thể khôi phục đối với hệ thống.</p>
                <button class="btn btn-outline" style="border-color: var(--danger); color: var(--danger);">Xóa toàn bộ bộ nhớ Cache AI</button>
            </div>
        </div>
    </main>

    <style>
        .settings-card {
            background: var(--white);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            padding: 32px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .form-input {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            width: 100%;
        }
        
        .form-input:focus {
            border-color: var(--primary);
        }
        
        .avatar-small {
            width: 32px;
            height: 32px;
            background-color: var(--secondary);
            color: var(--primary-hover);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
    </style>
</body>
</html>
