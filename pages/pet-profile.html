<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/logo/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ thú cưng - Vethic AI</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pet-profile.css">
</head>
<body class="bg-gray">
    <header class="topbar">
        <h1 class="page-title">Hồ sơ thú cưng của bạn</h1>
        <div class="user-menu flex items-center gap-4">
            <span class="user-name font-medium">Nguyễn Văn A</span>
            <div class="avatar-small"><img src="../assets/avatar/messi_avatar.jpg" alt="User" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>
        </div>
    </header>

    <main class="container page-content">
        <div class="page-header flex justify-between items-center" style="margin-bottom: 24px;">
            <div>
                <h2 style="font-size: 24px; font-weight: 700; color: var(--text-dark); margin-bottom: 8px;">Hồ sơ thú cưng của bạn</h2>
                <p style="color: var(--text-body); font-size: 14px;">Quản lý thông tin sức khỏe và lịch sử tiêm phòng cho những người bạn bốn chân.</p>
            </div>
            <a href="pet-form.html" class="btn btn-primary btn-sm flex items-center">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Thêm Thú Cưng Mới
            </a>
        </div>

        <div class="pet-grid" id="pet-grid">
            <!-- Dynamic pet cards will be rendered here by JS -->
        </div>
    </main>
    
    <!-- Scripts -->
    <script src="../js/pet-data.js"></script>
    <script src="../js/pet-profile.js"></script>
</body>
</html>
